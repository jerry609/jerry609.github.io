<svg xmlns="http://www.w3.org/2000/svg" width="740" height="320" viewBox="0 0 740 320">
  <defs>
    <marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#718057" stroke-width="1.5"/>
    </marker>
    <filter id="s1" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="740" height="320" rx="8" fill="#F9F9F7"/>
  <text x="370" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1E1E1E">单层 Transformer Block 维度流</text>

  <!-- 输入 -->
  <rect x="16" y="50" width="100" height="44" rx="8" fill="#D4E4D8" stroke="#718057" stroke-width="1.2" filter="url(#s1)"/>
  <text x="66" y="68" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1E1E1E">输入 <tspan font-style="italic">X</tspan><tspan font-size="7" baseline-shift="super">(𝑙)</tspan></text>
  <text x="66" y="84" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" font-style="italic" fill="#555">(B, T, d)</text>

  <line x1="120" y1="72" x2="142" y2="72" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- LN -->
  <rect x="146" y="55" width="54" height="34" rx="6" fill="#EDEDED" stroke="#BDBDBD" stroke-width="1"/>
  <text x="173" y="76" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#555">LN</text>

  <line x1="204" y1="72" x2="222" y2="72" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- Q/K/V 投影 -->
  <rect x="226" y="45" width="120" height="54" rx="8" fill="#B4D4B8" stroke="#4A6B3E" stroke-width="1.4" filter="url(#s1)"/>
  <text x="286" y="63" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1E1E1E"><tspan font-style="italic">Q, K, V</tspan> 投影</text>
  <text x="286" y="78" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#3A5A2E">(B, T, d) × W<tspan font-size="6" baseline-shift="sub">Q,K,V</tspan></text>
  <text x="286" y="92" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#555">→ (B, T, d)</text>

  <line x1="286" y1="103" x2="286" y2="123" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- 拆头 -->
  <rect x="226" y="127" width="120" height="44" rx="8" fill="#B4D4B8" stroke="#4A6B3E" stroke-width="1.2" filter="url(#s1)"/>
  <text x="286" y="146" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1E1E1E">拆成多头</text>
  <text x="286" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#3A5A2E">(B, H, T, d<tspan font-size="6" baseline-shift="sub">h</tspan>)</text>

  <line x1="350" y1="149" x2="376" y2="149" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- Attention Score -->
  <rect x="380" y="125" width="130" height="48" rx="8" fill="#FDF6F2" stroke="#D4A27F" stroke-width="1.2" filter="url(#s1)"/>
  <text x="445" y="144" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-style="italic" fill="#1E1E1E"><tspan font-weight="600">QK</tspan><tspan font-size="7" baseline-shift="super">⊤</tspan> / √d<tspan font-size="6" baseline-shift="sub">h</tspan> + M</text>
  <text x="445" y="163" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#8B6B50">(B, H, T, T)</text>

  <line x1="514" y1="149" x2="540" y2="149" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- Softmax + V -->
  <rect x="544" y="127" width="106" height="44" rx="8" fill="#FDF6F2" stroke="#D4A27F" stroke-width="1.2" filter="url(#s1)"/>
  <text x="597" y="146" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#1E1E1E">softmax · <tspan font-style="italic" font-weight="600">V</tspan></text>
  <text x="597" y="162" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#8B6B50">(B, H, T, d<tspan font-size="6" baseline-shift="sub">h</tspan>)</text>

  <line x1="597" y1="175" x2="597" y2="195" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- 拼接 + W_O -->
  <rect x="527" y="199" width="140" height="44" rx="8" fill="#D4E4D8" stroke="#718057" stroke-width="1.2" filter="url(#s1)"/>
  <text x="597" y="218" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#1E1E1E">Concat · <tspan font-style="italic">W</tspan><tspan font-size="6" baseline-shift="sub" font-style="italic">O</tspan></text>
  <text x="597" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#555">(B, T, d)</text>

  <!-- 残差箭头 (Attn) -->
  <path d="M66,98 L66,221 L523,221" fill="none" stroke="#718057" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#a1)"/>
  <text x="280" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#888">+ 残差</text>

  <!-- FFN 部分 -->
  <line x1="597" y1="247" x2="597" y2="262" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <rect x="146" y="266" width="54" height="34" rx="6" fill="#EDEDED" stroke="#BDBDBD" stroke-width="1"/>
  <text x="173" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#555">LN</text>

  <rect x="220" y="266" width="145" height="34" rx="8" fill="#E8D8C8" stroke="#D4A27F" stroke-width="1.2" filter="url(#s1)"/>
  <text x="292" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9.5" font-weight="600" fill="#1E1E1E">FFN</text>
  <text x="292" y="294" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" font-style="italic" fill="#8B6B50">d → d<tspan font-size="6" baseline-shift="sub">ff</tspan> → d</text>

  <!-- 残差箭头 (FFN) -->
  <text x="440" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#888">+ 残差 →</text>

  <!-- 输出 -->
  <rect x="520" y="266" width="106" height="34" rx="8" fill="#8BB88B" stroke="#4A6B3E" stroke-width="1.6" filter="url(#s1)"/>
  <text x="573" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#FFF">输出 <tspan font-style="italic">X</tspan><tspan font-size="7" baseline-shift="super">(𝑙+1)</tspan></text>
  <text x="573" y="294" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#E8F8E8">(B, T, d)</text>

  <!-- 连线到 LN 和 FFN -->
  <line x1="204" y1="283" x2="216" y2="283" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>
  <line x1="369" y1="283" x2="516" y2="283" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>

  <!-- 下行连接 -->
  <path d="M597,247 L120,247 L120,283 L142,283" fill="none" stroke="#718057" stroke-width="1.2" marker-end="url(#a1)"/>
</svg>

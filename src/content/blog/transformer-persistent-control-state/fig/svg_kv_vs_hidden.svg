<svg xmlns="http://www.w3.org/2000/svg" width="660" height="310" viewBox="0 0 660 310">
  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#718057" stroke-width="1.5"/>
    </marker>
    <filter id="shadow3" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="660" height="310" rx="8" fill="#F9F9F7"/>

  <text x="330" y="26" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#1E1E1E">KV Cache vs Hidden State：分层快照</text>

  <!-- 左侧标签 -->
  <text x="22" y="80" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#757575">Hidden State</text>
  <text x="22" y="93" font-family="system-ui,sans-serif" font-size="9" fill="#AAAAAA">（逐层演化）</text>

  <!-- 右侧标签 -->
  <text x="470" y="62" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#757575">KV Cache</text>
  <text x="470" y="75" font-family="system-ui,sans-serif" font-size="9" fill="#AAAAAA">（写入后不变）</text>

  <!-- Layer 0 -->
  <rect x="100" y="60" width="130" height="36" rx="8" fill="#E8F0E8" stroke="#A0C0A0" stroke-width="1" filter="url(#shadow3)"/>
  <text x="165" y="75" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="600" fill="#555">Layer 0: h₀</text>
  <text x="165" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#888">词法级 / 局部</text>

  <!-- Arrow to KV 0 -->
  <line x1="234" y1="78" x2="310" y2="78" stroke="#718057" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>

  <!-- KV 0 -->
  <rect x="314" y="64" width="100" height="28" rx="6" fill="#D4E4D8" stroke="#718057" stroke-width="1"/>
  <text x="364" y="82" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#3A5A2E">K₀, V₀</text>

  <!-- Lock icon 0 -->
  <text x="424" y="83" font-family="system-ui,sans-serif" font-size="11" fill="#AAAAAA">🔒</text>

  <!-- Arrow down from hs0 -->
  <line x1="165" y1="100" x2="165" y2="120" stroke="#718057" stroke-width="1.2" marker-end="url(#arrow3)"/>
  <text x="180" y="114" font-family="system-ui,sans-serif" font-size="7.5" fill="#888">+Attn +MLP</text>

  <!-- Layer 8 -->
  <rect x="100" y="124" width="130" height="36" rx="8" fill="#C8DCC8" stroke="#88B088" stroke-width="1.2" filter="url(#shadow3)"/>
  <text x="165" y="139" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="600" fill="#444">Layer 8: h₈</text>
  <text x="165" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#666">句法 / 短程语义</text>

  <line x1="234" y1="142" x2="310" y2="142" stroke="#718057" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>

  <rect x="314" y="128" width="100" height="28" rx="6" fill="#C8DCC8" stroke="#718057" stroke-width="1"/>
  <text x="364" y="146" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#3A5A2E">K₈, V₈</text>
  <text x="424" y="147" font-family="system-ui,sans-serif" font-size="11" fill="#AAAAAA">🔒</text>

  <line x1="165" y1="164" x2="165" y2="184" stroke="#718057" stroke-width="1.2" marker-end="url(#arrow3)"/>
  <text x="180" y="178" font-family="system-ui,sans-serif" font-size="7.5" fill="#888">+Attn +MLP</text>

  <!-- Layer 16 -->
  <rect x="100" y="188" width="130" height="36" rx="8" fill="#B4D4B8" stroke="#6A9A6A" stroke-width="1.4" filter="url(#shadow3)"/>
  <text x="165" y="203" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="600" fill="#333">Layer 16: h₁₆</text>
  <text x="165" y="216" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#444">任务模式 / 角色信息</text>

  <line x1="234" y1="206" x2="310" y2="206" stroke="#718057" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>

  <rect x="314" y="192" width="100" height="28" rx="6" fill="#B4D4B8" stroke="#4A6B3E" stroke-width="1.2"/>
  <text x="364" y="210" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#3A5A2E">K₁₆, V₁₆</text>
  <text x="424" y="211" font-family="system-ui,sans-serif" font-size="11" fill="#AAAAAA">🔒</text>

  <line x1="165" y1="228" x2="165" y2="248" stroke="#718057" stroke-width="1.2" marker-end="url(#arrow3)"/>
  <text x="180" y="242" font-family="system-ui,sans-serif" font-size="7.5" fill="#888">+Attn +MLP</text>

  <!-- Layer 22 (decision) -->
  <rect x="100" y="252" width="130" height="36" rx="8" fill="#8BB88B" stroke="#4A6B3E" stroke-width="1.8" filter="url(#shadow3)"/>
  <text x="165" y="267" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="700" fill="#FFF">Layer 22: h₂₂</text>
  <text x="165" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="600" fill="#E8F8E8">决策层 ★</text>

  <line x1="234" y1="270" x2="310" y2="270" stroke="#4A6B3E" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow3)"/>

  <rect x="314" y="256" width="100" height="28" rx="6" fill="#8BB88B" stroke="#4A6B3E" stroke-width="1.4"/>
  <text x="364" y="274" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" font-weight="600" fill="#FFF">K₂₂, V₂₂</text>
  <text x="424" y="275" font-family="system-ui,sans-serif" font-size="11" fill="#AAAAAA">🔒</text>

  <!-- 右侧大括号和说明 -->
  <path d="M448,70 Q460,70 460,90 L460,150 Q460,170 472,170 Q460,170 460,190 L460,260 Q460,280 448,280" fill="none" stroke="#BDBDBD" stroke-width="1.2"/>
  <text x="482" y="165" font-family="system-ui,sans-serif" font-size="9.5" font-weight="600" fill="#555">写入后冻结</text>
  <text x="482" y="180" font-family="system-ui,sans-serif" font-size="8.5" fill="#888">每层独立缓存</text>
  <text x="482" y="195" font-family="system-ui,sans-serif" font-size="8.5" fill="#888">后层不改前层</text>

  <!-- 底部要点 -->
  <rect x="470" y="240" width="175" height="50" rx="6" fill="#FDF6F2" stroke="#D4A27F" stroke-width="1"/>
  <text x="557" y="258" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" font-weight="600" fill="#8B6B50">Hidden State 逐层演化</text>
  <text x="557" y="272" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8.5" font-weight="600" fill="#8B6B50">KV Cache 分层快照</text>
  <text x="557" y="284" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#AAAAAA">二者互补，不矛盾</text>
</svg>
